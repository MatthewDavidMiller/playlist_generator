repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: python -m ruff check --fix
        language: python
        additional_dependencies: [ruff==0.15.9]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format
        language: python
        additional_dependencies: [ruff==0.15.9]
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: python
        additional_dependencies:
          - pytest==9.0.3
          - pytest-cov==7.1.0
        pass_filenames: false
        stages: [pre-commit]
