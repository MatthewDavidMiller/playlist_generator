name: Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.12"

      - name: Install pinned CI dependencies
        run: |
          py -m pip install --upgrade pip==24.0
          py -m pip install -r requirements/windows-ci-lock.txt
          py -m pip install -e . --no-deps
          py -m pip install pip-audit==2.10.0

      - name: Audit pinned dependencies
        run: pip-audit --strict -r requirements/windows-ci-lock.txt

      - name: Run test suite
        run: py -m pytest

      - name: Build Windows executables
        run: py -m playlist_generator.windows_build --target both --clean

      - name: Upload Windows executables
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-executables
          path: dist/*.exe
          if-no-files-found: error

  publish-release:
    if: github.ref_type == 'tag'
    needs: build-and-test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.12"

      - name: Install pinned CI dependencies
        run: |
          py -m pip install --upgrade pip==24.0
          py -m pip install -r requirements/windows-ci-lock.txt
          py -m pip install -e . --no-deps

      - name: Build Windows executables
        run: py -m playlist_generator.windows_build --target both --clean

      - name: Publish release assets
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836
        with:
          files: dist/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
